name: ShellCheck

on:
  push:
    paths:
      - "script/**"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "script/**"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC1090/SC1091: dynamic `source` paths can't be followed statically
          SHELLCHECK_OPTS: -e SC1090 -e SC1091
        with:
          scandir: "./script"
